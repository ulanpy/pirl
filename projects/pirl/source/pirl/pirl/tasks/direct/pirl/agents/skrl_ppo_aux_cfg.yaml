seed: 42


# Models are instantiated using skrl's model instantiator utility
# https://skrl.readthedocs.io/en/latest/api/utils/model_instantiators.html
models:
  separate: True
  policy:
    class: RecurrentGaussianPolicy
    clip_actions: False
    clip_log_std: True
    min_log_std: -20.0
    max_log_std: 2.0
    initial_log_std: -0.6
    sequence_length: 64
    gru_hidden_size: 256
    gru_num_layers: 1
    aux_dim: 9
  value:
    class: FeedForwardDeterministicValue
    clip_actions: False


# Rollout memory
# https://skrl.readthedocs.io/en/latest/api/memories/random.html
memory:
  class: RandomMemory
  memory_size: -1  # automatically determined (same as agent:rollouts)


# PPO agent configuration (field names are from PPO_DEFAULT_CONFIG)
# https://skrl.readthedocs.io/en/latest/api/agents/ppo.html
agent:
  class: PPODynamicsAuxRNN
  rollouts: 256
  learning_epochs: 6
  mini_batches: 4
  discount_factor: 0.99
  lambda: 0.95
  learning_rate: 3.0e-04
  learning_rate_scheduler: KLAdaptiveLR
  learning_rate_scheduler_kwargs:
    kl_threshold: 0.008
  state_preprocessor: RunningStandardScaler
  state_preprocessor_kwargs: null
  value_preprocessor: RunningStandardScaler
  value_preprocessor_kwargs: null
  random_timesteps: 0
  learning_starts: 0
  grad_norm_clip: 1.0
  ratio_clip: 0.2
  value_clip: 0.2
  clip_predicted_values: True
  entropy_loss_scale: 0.007
  value_loss_scale: 2.0
  kl_threshold: 0.0
  rewards_shaper_scale: 1.0
  dynamics_loss_scale: 0.02
  dynamics_learning_rate: 5.0e-04
  dynamics_hidden_layers: [128, 128]
  dynamics_target_dims: 5
  dynamics_use_normalized_vec: True
  # HJB PINN-style regularizer for critic (value function)
  hjb_loss_scale: 0.5
  hjb_max_lin_vel: 0.5
  hjb_max_ang_vel: 3.0
  hjb_time_weight: 0.5
  hjb_distance_weight: 0.5
  hjb_heading_weight: 0.2
  hjb_control_weight: 0.05
  hjb_progress_weight: 1.0
  # vec layout: [dot, cross, cross-track-error, heading-error, vx, vy, wz, d_signed, heading_error, ...]
  hjb_vec_d_index: 5
  hjb_vec_psi_index: 6
  time_limit_bootstrap: False
  # logging and checkpoint
  experiment:
    directory: "jettank_direct"
    experiment_name: ""
    write_interval: auto
    checkpoint_interval: auto


# Sequential trainer
# https://skrl.readthedocs.io/en/latest/api/trainers/sequential.html
trainer:
  class: SequentialTrainer
  timesteps: 100000
  environment_info: log
