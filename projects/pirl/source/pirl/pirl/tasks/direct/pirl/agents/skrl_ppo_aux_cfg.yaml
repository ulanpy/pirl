seed: 669


# Models are instantiated using skrl's model instantiator utility
# https://skrl.readthedocs.io/en/latest/api/utils/model_instantiators.html
models:
  separate: True
  policy:
    class: RecurrentGaussianPolicy
    clip_actions: False
    clip_log_std: True
    min_log_std: -20.0
    max_log_std: 2.0
    initial_log_std: -0.6
    sequence_length: 64
    gru_hidden_size: 256
    gru_num_layers: 1
    aux_dim: 8
  value:
    class: FeedForwardDeterministicValue
    clip_actions: False


# Rollout memory
# https://skrl.readthedocs.io/en/latest/api/memories/random.html
memory:
  class: RandomMemory
  memory_size: -1  # automatically determined (same as agent:rollouts)


# PPO agent configuration (field names are from PPO_DEFAULT_CONFIG)
# https://skrl.readthedocs.io/en/latest/api/agents/ppo.html
agent:
  class: PPOHjbRNN
  rollouts: 256
  learning_epochs: 6
  mini_batches: 8
  discount_factor: 0.99
  lambda: 0.95
  learning_rate: 3.0e-04
  # Disabled: KLAdaptiveLR kept crushing LR to ~0 around 30k steps on this task
  # (policy std stays wide -> per-update KL routinely exceeds the threshold ->
  # LR halves every step). Fixed LR + ratio_clip + grad_norm_clip is sufficient here.
  # learning_rate_scheduler: KLAdaptiveLR
  learning_rate_scheduler: null
  learning_rate_scheduler_kwargs:
    kl_threshold: 0.02
  state_preprocessor: RunningStandardScaler
  state_preprocessor_kwargs: null
  value_preprocessor: RunningStandardScaler
  value_preprocessor_kwargs: null
  random_timesteps: 0
  learning_starts: 0
  grad_norm_clip: 1.0
  ratio_clip: 0.2
  value_clip: 0.2
  clip_predicted_values: True
  entropy_loss_scale: 0.1
  value_loss_scale: 2.0
  kl_threshold: 0.0
  rewards_shaper_scale: 1.0
  # HJB PINN-style regularizer for critic (value function), reward-max convention.
  # Residual: r + grad V . f - rho V,  with r = -l  and  rho = -ln(gamma)/hjb_step_dt.
  hjb_loss_scale: 0.0
  hjb_max_lin_vel: 0.5
  hjb_max_ang_vel: 1.5
  hjb_time_weight: 0.5
  hjb_distance_weight: 0.5
  hjb_heading_weight: 0.2
  hjb_control_weight: 0.05
  hjb_progress_weight: 1.0
  # Env step in seconds (decimation 2 * sim.dt 1/120 = 1/60). Used to derive
  # the continuous-time discount rate rho that appears in the residual above.
  hjb_step_dt: 0.0166666667
  # Hamiltonian evaluation mode: "policy" (on-policy u) or "optimal" (analytic u* from dH/du=0)
  hjb_hamiltonian_mode: optimal
  # ObservationSchemaV2.1 vec layout (68 floats):
  # [vx, wz, d_signed, heading_error, path_window(24), lidar_sectors(32), prev_action(2), prev_reward(6)]
  hjb_vec_d_index: 2
  hjb_vec_psi_index: 3
  # LiDAR sector hits in body frame, used to extend HJB Hamiltonian dynamics with
  # static-obstacle body-frame kinematics: x_dot = -v + w*y, y_dot = -w*x. Must match
  # PirlEnvCfg.hjb_lidar_sector_count and the position appended in PirlEnv._build_vec_observation.
  hjb_lidar_hits_start_index: 28
  hjb_lidar_sector_count: 16
  time_limit_bootstrap: False
  # logging and checkpoint
  experiment:
    directory: "jettank_direct"
    experiment_name: ""
    write_interval: auto
    checkpoint_interval: auto


# Sequential trainer
# https://skrl.readthedocs.io/en/latest/api/trainers/sequential.html
trainer:
  class: SequentialTrainer
  timesteps: 100000
  environment_info: log
